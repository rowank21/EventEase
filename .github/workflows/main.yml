name: Build and Test EventEase

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore
      working-directory: ./  # Your .csproj is in the root folder

    - name: Build the application
      run: dotnet build --no-restore --configuration Release
      working-directory: ./

    # Optional: Add a step to run tests if you have any .csproj test files
    # - name: Run tests
    #   run: dotnet test --no-build --verbosity normal
    #   working-directory: ./
